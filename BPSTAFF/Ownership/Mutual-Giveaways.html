<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giveaway Tracker</title>

<link rel="icon" type="image/png" href="/images/BP-LOGO.png">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#02030a;color:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh}
.container{width:100%;max-width:520px;background:#0a0c1a;padding:25px;border-radius:12px;box-shadow:0 0 25px rgba(255,0,0,0.15)}
h2{text-align:center;color:#ff4d4d;margin-bottom:10px}
.total-box{text-align:center;margin-bottom:15px;font-size:14px;color:#aaa}
input,select,textarea{width:100%;padding:12px;margin-bottom:10px;background:#05070f;border:1px solid #3a1a1a;border-radius:8px;color:#fff}
button{width:100%;padding:14px;border:none;border-radius:8px;background:linear-gradient(90deg,#990000,#ff1a1a);color:#fff;font-weight:bold;cursor:pointer}
</style>
</head>

<body>

<div class="container">
  <h2>Giveaway Tracker</h2>

  <div class="total-box">
    Total Spent: £<span id="totalSpent">0</span>
  </div>

  <form id="giveawayForm">
    <input type="text" id="staff" placeholder="Staff Username" required>

    <select id="type">
      <option value="Mutual">Mutual Giveaway</option>
      <option value="Solo">Solo Giveaway</option>
    </select>

    <input type="text" id="product" placeholder="Product Name" required>
    <input type="number" id="price" placeholder="Price (£)" required>
    <input type="number" id="quantity" placeholder="Quantity" value="1">

    <input type="text" id="platform" placeholder="Platform (Discord, Roblox, etc)" required>
    <input type="text" id="winner" placeholder="Winner Username / ID" required>

    <input type="text" id="partner" placeholder="Mutual Partner (if any)">
    <input type="number" id="returns" placeholder="Returns (£, if any)">
    <textarea id="notes" placeholder="Extra notes..."></textarea>

    <button type="submit">Submit</button>
  </form>
</div>

<script>
let totalSpent = localStorage.getItem("totalSpent") || 0;
document.getElementById("totalSpent").innerText = totalSpent;

document.getElementById("giveawayForm").addEventListener("submit", async (e)=>{
  e.preventDefault();

  const type = document.getElementById("type").value;

  let webhookURL = type === "Mutual"
    ? "https://discord.com/api/webhooks/1500440450291728486/8smqH0XQLPOoRkTYXi7UogyQykEwLKkr1tLek5iMxcjtYtHXEP7I6C3HhpXEbqUSM4iO"
    : "https://discord.com/api/webhooks/1500440810167074866/u_jevdEpTve7g59vzCEJUm7LDt0dUdj9IFcru_ZNCdMbcqwP0t1gdID2ntsWxn9_YOQu";

  const price = parseFloat(document.getElementById("price").value);
  const qty = parseInt(document.getElementById("quantity").value)||1;
  const returns = parseFloat(document.getElementById("returns").value)||0;

  const totalCost = price * qty;
  const netCost = totalCost - returns;

  totalSpent = parseFloat(totalSpent) + netCost;
  localStorage.setItem("totalSpent", totalSpent);
  document.getElementById("totalSpent").innerText = totalSpent.toFixed(2);

  const now = new Date().toLocaleString("en-GB");

  const data = {
    embeds:[{
      title:"🎁 New Giveaway Logged",
      color:type==="Mutual"?16753920:16711680,
      fields:[
        {name:"Staff",value:document.getElementById("staff").value,inline:true},
        {name:"Type",value:type,inline:true},

        {name:"Product",value:document.getElementById("product").value},
        {name:"Price Each",value:"£"+price,inline:true},
        {name:"Quantity",value:qty.toString(),inline:true},

        {name:"Total Cost",value:"£"+totalCost.toFixed(2)},
        {name:"Returns",value:"£"+returns.toFixed(2),inline:true},
        {name:"Net Cost",value:"£"+netCost.toFixed(2),inline:true},

        {name:"Winner",value:document.getElementById("winner").value},
        {name:"Platform",value:document.getElementById("platform").value},

        {name:"Mutual Partner",value:document.getElementById("partner").value||"None"},
        {name:"Notes",value:document.getElementById("notes").value||"N/A"},

        {name:"Total Spent (All Time)",value:"£"+totalSpent.toFixed(2)},
        {name:"Time",value:now}
      ]
    }]
  };

  await fetch(webhookURL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  });

  alert("Logged successfully.");
});
</script>

</body>
</html>
